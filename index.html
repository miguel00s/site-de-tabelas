<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Tabelas</title>
</head>
<style>

    body{
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f0f0f0;
    }
    .container{width: 800px;
    border: 1px solid #ccc;
    background-color: #fff;
    margin: 0 auto;
    border-collapse: collapse;
    }
    .header{
        background-color: darkmagenta;
        color: white;
        text-align: center;
        padding: 20px;
    }
    .subheader{
        background-color: purple;
        color: white;
        text-align: center;
        padding: 5px;
        font-size: 0.9em;
    }
    .sidebar{
        width: 200px;
        vertical-align: top;
        background-color: #f9f9f9;
        padding: 15px;
        border-right: 1px solid #ccc;
    }
    .menu-box{
        border: 1px solid #ddd;
        background-color: #eee;
    }
    .menu-title{
        background-color: #ddd;
        padding: 5px;
        font-weight: bold;
        text-align: center;
    }
    .menu-list{
        list-style-type: disc;
        padding-left: 25px;
        line-height: 1.8;
    }
    .main-content{
        padding: 20px;
        vertical-align: top;
        height: 300px;
    }
    .footer{
        background-color: #eee;
        text-align: center;
        padding: 10px;
        border-top: 1px solid #ccc;
        color: #555;
    }

</style>

<body>

    <table class="container">

        <tr>
            <td colspan="2" class="header">
                <h1 style="margin: 0;">Meu site</h1>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="subheader">
                Usando tabelas em HTML
            </td>
        </tr>

        <tr>
            <td class="sidebar">
                <div class="menu-box">
                    <div class="menu-title">Menu</div>    
                    <ul class="menu-list">
                        <li><a href="#">Início</a></li>
                        <li><a href="#">Sobre</a></li>
                        <li><a href="#">Serviços</a></li>
                        <li><a href="#">Contato</a></li>
                </ul>
                </div>
            </td>
            <td class="main-content">
                <h2 style="margin-top: 0;">Bem-vindo!</h2>
                <hr>
                <p>Este é um exemplo de site criado utilizando tabelas.</p>
                <p>Antigamente, esse era um método comum para estruturar páginas.</p>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="footer">
                &copy;2026 - Meu Site
            </td>
        </tr>

    </table>

</body>
</html>
